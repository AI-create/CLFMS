services:
  db:
    image: postgres:15-alpine
    container_name: clfms_db
    environment:
      POSTGRES_DB: clfms
      POSTGRES_USER: clfms_user
      POSTGRES_PASSWORD: clfms_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clfms_user -d clfms"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: .
    container_name: clfms_backend
    environment:
      DATABASE_URL: postgresql://clfms_user:clfms_password@db:5432/clfms
      SECRET_KEY: your-secret-key-change-in-production
      ADMIN_EMAIL: admin@clfms.local
      ADMIN_PASSWORD: admin123
      COMPANY_STATE: KA
      DEBUG: "False"
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./app:/app/app
      - ./uploads:/app/uploads
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  postgres_data:
