# Alembic Configuration File

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S

[alembic]
sqlalchemy.url = driver://user:password@localhost/dbname
prepend_sys_path = .
version_path_separator = :
script_location = alembic
version_locations = %(here)s/alembic/versions
target_metadata = app.core.database.Base.metadata

[migration]
multidb = False
configure_logger = True
