services:
  db:
    image: postgres:15-alpine
    container_name: clfms_db
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    environment:
      POSTGRES_DB: clfms
      POSTGRES_USER: clfms_user
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - clfms_postgres_data:/var/lib/postgresql/data
    networks:
      - clfms_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clfms_user -d clfms"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: .
    container_name: clfms_backend
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    environment:
      DATABASE_URL: postgresql://clfms_user:${DB_PASSWORD}@db:5432/clfms
      SECRET_KEY: ${SECRET_KEY}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_FROM: ${SMTP_FROM}
      ENVIRONMENT: ${ENVIRONMENT:-production}
      CORS_ORIGINS: ${CORS_ORIGINS}
      SEED_DEFAULT_ADMIN: ${SEED_DEFAULT_ADMIN:-false}
      COMPANY_STATE: KA
      DEBUG: "False"
    ports:
      - "8080:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - clfms_uploads:/app/uploads
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"
    networks:
      - clfms_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  clfms_postgres_data:
  clfms_uploads:

networks:
  clfms_net:
    driver: bridge
